<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MatekSprint Pro + Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ... (Az előző stílusok maradnak) ... */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0f0f1a; --surface:#1a1a2e; --surface2:#252540; --text:#f0f0ff; --text-dim:#8888aa; --c1:#4cc9f0; --c2:#ff9e00; --c3:#06d6a0; --c4:#ff6b9d; --danger:#ff4d6d; --ok:#06d6a0; --font-ui:'Nunito', sans-serif; --font-num:'Space Mono', monospace; --accent:#4cc9f0; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: var(--font-ui); background: var(--bg); color: var(--text); }
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; transition: 0.2s; }
    .screen.hidden { opacity: 0; pointer-events: none; transform: scale(.96); }
    
    #home { justify-content: flex-start; overflow-y: auto; }
    .logo { font-family: var(--font-num); font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #4cc9f0, #ff6b9d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
    .categories { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .cat-btn { background: var(--surface); border: 2px solid var(--surface2); border-radius: 16px; padding: 15px; cursor: pointer; position: relative; }
    .cat-name { font-weight: 800; font-size: 14px; }
    .cat-hs { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
    
    /* ÚJ: Hiba-indikátorok a főmenüben */
    .err-analysis { display: flex; gap: 4px; margin-top: 8px; }
    .err-dot { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: var(--surface2); color: var(--text-dim); font-family: var(--font-num); }
    .err-dot.active { background: color-mix(in srgb, var(--danger) 30%, transparent); color: var(--danger); font-weight: 700; border: 1px solid var(--danger); }

    .err-tag { font-size: 9px; background: var(--surface2); color: var(--danger); padding: 2px 4px; border-radius: 4px; margin-left: 5px; font-weight: 700; font-family: var(--font-num); }
    
    /* ... (Game & Result stílusok rövidítve a helytakarékosság miatt, de funkcionálisan azonosak) ... */
    #game { justify-content: space-between; }
    .task-eq { font-family: var(--font-num); font-size: 42px; font-weight: 700; margin: 20px 0; }
    .answer-box { font-family: var(--font-num); font-size: 36px; background: var(--surface); padding: 10px 30px; border-radius: 12px; border: 2px solid var(--accent); min-width: 120px; text-align: center; }
    .kb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 320px; }
    .kb-btn { background: var(--surface); border: 1px solid var(--surface2); color: white; padding: 15px; border-radius: 10px; font-family: var(--font-num); font-size: 20px; }
    .kb-ok { background: var(--accent); }
    .history-item { display: flex; width: 100%; background: var(--surface); margin-bottom: 5px; padding: 10px; border-radius: 8px; font-size: 13px; }
    .history-item.correct { border-left: 4px solid var(--ok); }
    .history-item:not(.correct) { border-left: 4px solid var(--danger); }
    .stars-bg { position: fixed; inset: 0; z-index: -1; background: #0f0f1a; }
  </style>
</head>
<body>
<canvas class="stars-bg" id="stars-canvas"></canvas>

<div class="screen" id="home">
  <div class="logo">MatekSprint Pro</div>
  <div class="categories" id="cat-list"></div>
</div>

<div class="screen hidden" id="game">
  <div id="score-num" style="font-size: 24px;">0</div>
  <div id="timer-num" style="font-size: 32px; font-family: var(--font-num);">60</div>
  <div class="task-eq" id="task-eq"></div>
  <div class="answer-box" id="answer-box"><span id="answer-text"></span></div>
  <div class="kb-grid" id="kb-grid"></div>
</div>

<div class="screen hidden" id="result">
  <h1 id="result-num" style="font-size: 64px;">0</h1>
  <div id="res-acc" style="margin-bottom: 20px;"></div>
  <button onclick="renderHome()" style="padding: 15px 30px; border-radius: 12px; background: var(--accent); border: none; color: white; font-weight: 800; cursor: pointer;">Vissza a menübe</button>
  <div id="history-list" style="width: 100%; margin-top: 20px; overflow-y: auto;"></div>
</div>

<script>
const CATS = {
  szorzas: { name:'Szorzótábla', color:'#4cc9f0', bonusTime: 2000, 
    gen: (l) => ({q:`${rand(2, 5+l*2)} × ${rand(2, 9)}`, type:'MUL'}) },
  osztas: { name:'Osztás', color:'#ff9e00', bonusTime: 3500,
    gen: (l) => { const b=rand(2, 6+l), c=rand(2, 8+l); return {q:`${b*c} ÷ ${b}`, a:c, type:'DIV', base:b*c, div:b} } },
  tszorz: { name:'Tizedes szorzás', color:'#06d6a0', bonusTime: 3000,
    gen: (l) => { const m=[10,100,1000][rand(0,Math.min(2,l-1))]; const v=rand(11,99)/10; return {q:`${v} × ${m}`, type:'DEC_MUL'} } },
  toszt: { name:'Tizedes osztás', color:'#ff6b9d', bonusTime: 4000,
    gen: (l) => { const c=rand(1,30+(l*10)), b=rand(2,5); return {q:`${fmt(c*b/10)} ÷ ${b}`, type:'DEC_DIV'} } }
};

let S = { cat:null, score:0, time:60, timer:null, task:null, input:'', history:[], mistakes:[], level:1, streak:0, start:0 };

const rand = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const fmt = n => parseFloat(n.toFixed(8)).toString();

// Statisztikák lekérése hibaelemzéssel
const getStats = (id) => JSON.parse(localStorage.getItem('stats_'+id)) || { hs:0, avgT:0, acc:0, plays:0, errors: { M:0, D:0, R:0, F:0 } };

function renderHome() {
  const container = document.getElementById('cat-list');
  container.innerHTML = '';
  Object.keys(CATS).forEach(id => {
    const stats = getStats(id);
    const btn = document.createElement('div');
    btn.className = 'cat-btn';
    
    // Hibakód magyarázatok és "dot" logika
    const errMap = { M:'Matek', D:'Tizedes', R:'Fordított', F:'Formátum' };
    let errHtml = '<div class="err-analysis">';
    for(let code in errMap) {
      const count = stats.errors[code] || 0;
      errHtml += `<div class="err-dot ${count > 2 ? 'active' : ''}" title="${errMap[code]}: ${count}">${code}</div>`;
    }
    errHtml += '</div>';

    btn.innerHTML = `
      <div class="cat-name">${CATS[id].name}</div>
      <div class="cat-hs">Rekord: <b>${stats.hs}</b> | Idő: <b>${stats.avgT}ms</b></div>
      ${errHtml}
    `;
    btn.onclick = () => startGame(id);
    container.appendChild(btn);
  });
  showScreen('home');
}

function getErrorCode(input, correct, task) {
  const inp = input.replace(',', '.');
  const userNum = parseFloat(inp);
  const corrNum = parseFloat(correct);
  if (isNaN(userNum)) return "F";
  if (task.type === 'DIV' && (userNum === task.base || userNum === task.div)) return "R";
  const s1 = inp.replace('.', '').replace(/^0+/, '');
  const s2 = correct.replace('.', '').replace(/^0+/, '');
  if (s1 === s2 && inp !== correct) return "D";
  return "M";
}

function submit() {
  if (!S.input) return;
  const rt = performance.now() - S.start;
  const cleanInput = S.input.replace(',', '.');
  
  // Ha nincs előre megadott 'a', kiszámoljuk a 'q'-ból
  if(!S.task.a) {
    const q = S.task.q.replace('×', '*').replace('÷', '/');
    S.task.a = fmt(eval(q));
  }

  const isCorrect = fmt(parseFloat(cleanInput)) === S.task.a;
  let errorCode = isCorrect ? null : getErrorCode(S.input, S.task.a, S.task);

  S.history.push({ q: S.task.q, ua: S.input, ca: S.task.a, ok: isCorrect, rt, err: errorCode });

  if (isCorrect) {
    S.score += (rt < CATS[S.cat].bonusTime) ? 2 : 1;
    document.getElementById('score-num').textContent = S.score;
  } else {
    S.mistakes.push(S.task);
  }
  nextTask();
}

function endGame() {
  clearInterval(S.timer);
  const stats = getStats(S.cat);
  const correct = S.history.filter(h => h.ok).length;
  const acc = S.history.length ? Math.round(correct/S.history.length*100) : 0;
  const avg = S.history.length ? Math.round(S.history.reduce((a,b)=>a+b.rt,0)/S.history.length) : 0;

  // HIBAKÓDOK ÖSSZESÍTÉSE
  const currentErrors = { ...stats.errors };
  S.history.forEach(h => { if(h.err) currentErrors[h.err] = (currentErrors[h.err] || 0) + 1; });

  localStorage.setItem('stats_'+S.cat, JSON.stringify({
    hs: Math.max(stats.hs, S.score),
    avgT: stats.plays === 0 ? avg : Math.round((stats.avgT + avg) / 2),
    acc: stats.plays === 0 ? acc : Math.round((stats.acc + acc) / 2),
    plays: stats.plays + 1,
    errors: currentErrors
  }));

  document.getElementById('result-num').textContent = S.score;
  document.getElementById('res-acc').textContent = `Pontosság: ${acc}% | Átlagidő: ${avg}ms`;
  renderHistory();
  showScreen('result');
}

// ... (startGame, nextTask, handleKey, rebuildKeyboard, showScreen - maradnak az eredeti logikával) ...
function startGame(id) {
  S = { cat:id, score:0, time:60, timer:null, task:null, input:'', history:[], mistakes:[], level:1, streak:0, start:0 };
  document.documentElement.style.setProperty('--accent', CATS[id].color);
  rebuildKeyboard(id.includes('t') || id === 'tort');
  nextTask();
  showScreen('game');
  S.timer = setInterval(() => {
    S.time--;
    document.getElementById('timer-num').textContent = S.time;
    if (S.time <= 0) endGame();
  }, 1000);
}

function nextTask() {
  S.input = ''; document.getElementById('answer-text').textContent = '';
  const t = CATS[S.cat].gen(S.level);
  S.task = t;
  document.getElementById('task-eq').textContent = t.q + " = ?";
  S.start = performance.now();
}

function handleKey(v) {
  if (v === 'OK') submit();
  else if (v === 'DEL') S.input = S.input.slice(0,-1);
  else S.input += v;
  document.getElementById('answer-text').textContent = S.input;
}

function rebuildKeyboard(dot) {
  const grid = document.getElementById('kb-grid'); grid.innerHTML = '';
  [1,2,3,4,5,6,7,8,9,0].forEach(n => {
    const b = document.createElement('button'); b.className='kb-btn'; b.textContent=n;
    b.onclick=()=>handleKey(n.toString()); grid.appendChild(b);
  });
  if(dot) { const d=document.createElement('button'); d.className='kb-btn'; d.textContent=','; d.onclick=()=>handleKey('.'); grid.appendChild(d); }
  const del=document.createElement('button'); del.className='kb-btn'; del.textContent='⌫'; del.onclick=()=>handleKey('DEL'); grid.appendChild(del);
  const ok=document.createElement('button'); ok.className='kb-btn kb-ok'; ok.textContent='OK'; ok.onclick=()=>handleKey('OK'); grid.appendChild(ok);
}

function renderHistory() {
  const container = document.getElementById('history-list'); container.innerHTML = '';
  S.history.slice(-10).reverse().forEach(h => {
    const item = document.createElement('div'); item.className = `history-item ${h.ok?'correct':''}`;
    item.innerHTML = `<div>${h.q} = <b>${h.ua}</b> ${!h.ok ? ` (=${h.ca})` : ''} ${h.err ? `<span class="err-tag">${h.err}</span>` : ''}</div>`;
    container.appendChild(item);
  });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

renderHome();
</script>
</body>
</html>
