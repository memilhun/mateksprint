<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatekSprint+</title>
<style>
body { font-family: sans-serif; text-align: center; background:#111; color:#fff; }
button { padding:10px; margin:5px; font-size:18px; }
#task { font-size:40px; margin:20px; }
#answer { font-size:30px; }
</style>
</head>
<body>

<h1>MatekSprint+</h1>

<div id="home">
  <button onclick="startGame('szorzas')">Szorzás</button>
  <button onclick="startGame('osztas')">Osztás</button>
</div>

<div id="game" style="display:none;">
  <div>Pont: <span id="score">0</span></div>
  <div>Idő: <span id="time">60</span></div>
  <div>Szint: <span id="level">1</span></div>
  <div id="task"></div>
  <input id="answer" autocomplete="off">
  <br>
  <button onclick="submit()">OK</button>
</div>

<div id="result" style="display:none;"></div>

<script>

// ---------- STATE ----------
let S = {
  cat:null,
  score:0,
  timeLeft:60,
  timer:null,
  used:new Set(),
  task:null,
  history:[],
  input:'',

  skill:{ level:1, correctStreak:0, wrongStreak:0 },
  mistakes:[],
  taskStart:0
};

const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

// ---------- TASKS ----------
const CATS = {

szorzas:{
generate(){
  const max = 3 + S.skill.level*2;
  const a = rand(1,max);
  const b = rand(1,max);
  return {display:`${a} × ${b}`, answer:a*b};
}
},

osztas:{
generate(){
  const max = 3 + S.skill.level*2;
  const b = rand(2,max);
  const c = rand(2,max);
  return {display:`${b*c} ÷ ${b}`, answer:c};
}
}

};

// ---------- GAME ----------
function startGame(cat){
  S={
    cat,
    score:0,
    timeLeft:60,
    used:new Set(),
    history:[],
    mistakes:[],
    skill:{level:1,correctStreak:0,wrongStreak:0}
  };

  document.getElementById('home').style.display='none';
  document.getElementById('game').style.display='block';

  nextTask();

  S.timer=setInterval(()=>{
    S.timeLeft--;
    document.getElementById('time').textContent=S.timeLeft;
    if(S.timeLeft<=0) endGame();
  },1000);
}

// ---------- NEXT TASK ----------
function nextTask(){

  if(S.mistakes.length>0 && Math.random()<0.3){
    S.task=S.mistakes[rand(0,S.mistakes.length-1)];
  }else{
    S.task=CATS[S.cat].generate();
  }

  document.getElementById('task').textContent=S.task.display;

  document.getElementById('answer').value='';
  document.getElementById('level').textContent=S.skill.level;

  S.taskStart=performance.now();
}

// ---------- SUBMIT ----------
function submit(){

  const val=parseFloat(document.getElementById('answer').value);
  if(isNaN(val)) return;

  const correct = val == S.task.answer;

  const reaction = performance.now()-S.taskStart;

  S.history.push({...S.task, correct, reaction});

  if(correct){

    S.skill.correctStreak++;
    S.skill.wrongStreak=0;

    if(S.skill.correctStreak>=5){
      S.skill.level++;
      S.skill.correctStreak=0;
    }

    let pts=1;
    if(reaction<2000) pts++;
    if(S.skill.level>=4) pts++;

    S.score+=pts;

  }else{

    S.skill.wrongStreak++;
    S.skill.correctStreak=0;

    S.mistakes.push(S.task);

    if(S.skill.wrongStreak>=3){
      S.skill.level--;
      S.skill.wrongStreak=0;
    }

  }

  S.skill.level=Math.max(1,Math.min(5,S.skill.level));

  document.getElementById('score').textContent=S.score;

  nextTask();
}

// ---------- END ----------
function endGame(){
  clearInterval(S.timer);

  document.getElementById('game').style.display='none';
  document.getElementById('result').style.display='block';

  const total=S.history.length;
  const correct=S.history.filter(h=>h.correct).length;
  const avg=Math.round(S.history.reduce((a,b)=>a+b.reaction,0)/total);

  document.getElementById('result').innerHTML=`
  <h2>Vége!</h2>
  Pont: ${S.score}<br>
  Pontosság: ${Math.round(correct/total*100)}%<br>
  Átlagidő: ${avg} ms<br>
  Szint: ${S.skill.level}<br><br>
  <button onclick="location.reload()">Újra</button>
  `;
}

</script>
</body>
</html>
