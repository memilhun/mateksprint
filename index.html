<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MatekSprint Pro - Refactored</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { 
        --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #252540; --text: #f0f0ff; 
        --text-dim: #8888aa; --c1: #4cc9f0; --c2: #ff9e00; --c3: #06d6a0; --c4: #ff6b9d; 
        --danger: #ff4d6d; --ok: #06d6a0; --font-ui: 'Nunito', sans-serif; 
        --font-num: 'Space Mono', monospace; 
        --safe-top: env(safe-area-inset-top, 20px); 
        --safe-bot: env(safe-area-inset-bottom, 20px); 
        --accent: #4cc9f0; 
    }
    
    html, body { 
        height: 100dvh; /* Dynamic Viewport Height iOS-hez */
        width: 100vw; 
        overflow: hidden; 
        touch-action: manipulation; 
        background: var(--bg); 
        color: var(--text); 
        font-family: var(--font-ui);
    }

    .screen { 
        position: absolute; 
        inset: 0; 
        display: flex; 
        flex-direction: column; 
        padding: var(--safe-top) 16px var(--safe-bot); 
        transition: opacity .18s ease; 
    }

    /* Görgethető tartalom a fix billentyűzet felett */
    .scroll-content {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
        padding-bottom: 10px;
    }

    .hidden { opacity: 0; pointer-events: none; }

    /* Rács stílusa */
    #visual-container { 
        display: none; 
        flex-direction: column; 
        align-items: center; 
        gap: 8px; 
    }
    .grid-label { font-size: 14px; color: var(--text-dim); font-weight: 700; }
    #visual-canvas { 
        width: min(220px, 50vw); 
        height: min(220px, 50vw); 
        background: var(--surface2); 
        border-radius: 8px; 
        border: 2px solid var(--surface2);
    }

    /* Billentyűzet - Fixált alulra */
    .keyboard { 
        width: 100%; 
        max-width: 400px; 
        margin: 0 auto;
        padding-top: 10px;
        flex-shrink: 0;
    }
    .kb-grid { 
        display: grid; 
        grid-template-columns: repeat(3, 1fr); 
        gap: 8px; 
    }
    .kb-btn { 
        font-family: var(--font-num); 
        font-size: 24px; 
        font-weight: 700; 
        background: var(--surface); 
        border: 1px solid var(--surface2); 
        border-radius: 12px; 
        color: var(--text); 
        height: 54px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        -webkit-user-select: none;
    }
    .kb-btn:active { background: var(--surface2); transform: scale(0.95); }
    .kb-ok { 
        background: var(--accent); 
        color: #fff; 
        grid-column: span 3; /* Teljes szélesség, hogy ne maradhasson le */
        font-weight: 900;
        margin-top: 4px;
    }

    .task-eq { font-family: var(--font-num); font-size: 32px; text-align: center; margin: 10px 0; }
    .answer-box { font-family: var(--font-num); font-size: 38px; color: var(--accent); min-height: 70px; width: 100%; max-width: 300px; background: var(--surface); border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--surface2); }
    
    /* Star background fix */
    .stars-bg { position: fixed; inset: 0; z-index: -1; }
  </style>
</head>
<body>
<canvas class="stars-bg" id="stars-canvas"></canvas>

<div class="screen" id="home">
    <div class="scroll-content">
        <div style="padding: 40px 0; text-align: center;">
            <h1 style="font-family: var(--font-num); font-size: 38px;">MatekSprint</h1>
            <p style="color: var(--text-dim);">VÁLASSZ KATEGÓRIÁT</p>
        </div>
        <div id="cat-list" style="width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px;"></div>
    </div>
</div>

<div class="screen hidden" id="game">
    <div class="scroll-content">
        <div style="display: flex; justify-content: space-between; width: 100%; font-family: var(--font-num); font-size: 24px;">
            <span id="score-num">0</span>
            <span id="timer-num">60</span>
        </div>
        <div id="task-eq" class="task-eq"></div>
        <div id="visual-container">
            <span class="grid-label">10 × 10-ES RÁCS</span>
            <canvas id="visual-canvas" width="200" height="200"></canvas>
        </div>
        <div class="answer-box"><span id="answer-text"></span><span style="width:2px; height:30px; background:var(--accent); margin-left:5px;"></span></div>
    </div>
    <div class="keyboard">
        <div class="kb-grid" id="kb-grid"></div>
        <button class="kb-btn kb-ok" onclick="submit()">BEKÜLDÉS</button>
    </div>
</div>

<div class="screen hidden" id="result">
    <div class="scroll-content">
        <h2 style="font-size: 60px; color: var(--accent);" id="result-num">0</h2>
        <div id="res-stats" style="text-align: center; margin-bottom: 20px;"></div>
        <button class="kb-btn kb-ok" style="max-width: 300px;" onclick="renderHome()">VISSZA A MENÜBE</button>
        <div id="history-list" style="width: 100%; margin-top: 20px;"></div>
    </div>
</div>

<script>
// --- KONSTANSOK ÉS ÁLLAPOT ---
const CATS = {
    tszorz: { name: 'Tizedes szorzás', color: '#06d6a0', gen: (l) => ({ q: `${(rand(2, 9)/10).toFixed(1)} × ${rand(2, 9)}`, a: null }) },
    grid: { name: 'Rács-arány', color: '#ff6b9d', gen: () => { const f = rand(10, 90); return { q: 'Hányad része színes?', a: (f/100).toString(), isVisual: true, val: f }; } }
};

let State = { cat: 'grid', score: 0, time: 60, input: '', task: null, history: [] };
const rand = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;

// --- LOGIKA ---
function startGame(id) {
    State = { cat: id, score: 0, time: 60, input: '', history: [] };
    showScreen('game');
    nextTask();
    startTimer();
}

function nextTask() {
    State.input = '';
    document.getElementById('answer-text').textContent = '';
    
    // 5. osztályos logika: néha dobjunk be rácsot a tizedeseknél
    if (Math.random() > 0.7 || State.cat === 'grid') {
        State.task = CATS.grid.gen();
    } else {
        State.task = CATS.tszorz.gen();
        const parts = State.task.q.split(' × ');
        State.task.a = (parseFloat(parts[0]) * parseFloat(parts[1])).toFixed(2).replace(/\.00$/, '').replace(/\.0$/, '');
    }

    document.getElementById('task-eq').textContent = State.task.isVisual ? State.task.q : `${State.task.q} = ?`;
    document.getElementById('visual-container').style.display = State.task.isVisual ? 'flex' : 'none';
    if (State.task.isVisual) drawGrid(State.task.val);
    
    renderKeyboard();
}

function drawGrid(filled) {
    const canvas = document.getElementById('visual-canvas');
    const ctx = canvas.getContext('2d');
    const s = 20; // 200/10
    ctx.clearRect(0,0,200,200);
    
    for(let i=0; i<100; i++) {
        const x = (i % 10) * s;
        const y = Math.floor(i / 10) * s;
        
        // Alapszín
        ctx.fillStyle = i < filled ? '#4cc9f0' : '#252540';
        ctx.fillRect(x + 1, y + 1, s - 2, s - 2);
        
        // 5x5-ös vastagabb segédvonalak (pedagógiai segítség 12 éveseknek)
        ctx.strokeStyle = '#0f0f1a';
        ctx.lineWidth = 0.5;
        if ((i+1) % 5 === 0) ctx.lineWidth = 2;
        ctx.strokeRect(x, y, s, s);
    }
}

function renderKeyboard() {
    const container = document.getElementById('kb-grid');
    container.innerHTML = '';
    const keys = [1,2,3,4,5,6,7,8,9,',',0,'⌫'];
    keys.forEach(k => {
        const btn = document.createElement('div');
        btn.className = 'kb-btn';
        btn.textContent = k;
        btn.onclick = () => {
            if (k === '⌫') State.input = State.input.slice(0, -1);
            else if (State.input.length < 8) State.input += k;
            document.getElementById('answer-text').textContent = State.input;
        };
        container.appendChild(btn);
    });
}

function submit() {
    if (!State.input) return;
    const userAns = State.input.replace(',', '.');
    const isCorrect = Math.abs(parseFloat(userAns) - parseFloat(State.task.a)) < 0.0001;
    
    if (isCorrect) State.score++;
    State.history.push({ q: State.task.q, a: State.task.a, ua: State.input, ok: isCorrect });
    
    document.getElementById('score-num').textContent = State.score;
    nextTask();
}

// --- UTILS ---
function startTimer() {
    const timer = setInterval(() => {
        State.time--;
        document.getElementById('timer-num').textContent = State.time;
        if (State.time <= 0) { clearInterval(timer); showScreen('result'); renderResult(); }
    }, 1000);
}

function renderResult() {
    document.getElementById('result-num').textContent = State.score;
}

function renderHome() {
    const list = document.getElementById('cat-list');
    list.innerHTML = '';
    Object.keys(CATS).forEach(k => {
        const b = document.createElement('div');
        b.className = 'kb-btn';
        b.style.borderColor = CATS[k].color;
        b.textContent = CATS[k].name;
        b.onclick = () => startGame(k);
        list.appendChild(b);
    });
    showScreen('home');
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

renderHome();
</script>
</body>
</html>
