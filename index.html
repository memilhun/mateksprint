<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatekSprint+</title>
<style>
body { font-family: sans-serif; text-align: center; background:#111; color:#fff; }
button { padding:10px; margin:5px; font-size:18px; }
#task { font-size:40px; margin:20px; }
#answer { font-size:30px; }
</style>
</head>
<body>

<h1>MatekSprint+</h1>

<div id="home">
  <button onclick="startGame('szorzas')">Szorzás</button>
  <button onclick="startGame('osztas')">Osztás</button>
</div>

<div id="game" style="display:none;">
  <div>Pont: <span id="score">0</span></div>
  <div>Idő: <span id="time">60</span></div>
  <div>Szint: <span id="level">1</span></div>
  <div id="task"></div>
  <input id="answer" autocomplete="off">
  <br>
  <button onclick="submit()">OK</button>
</div>

<div id="result" style="display:none;"></div>

<script>

// ── HELPERS ─────────────────────────────────────────
const rand = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const fmt = n => parseFloat(n.toFixed(8)).toString();

// ── STATE ───────────────────────────────────────────
let S = {
  cat:null,
  score:0,
  timeLeft:60,
  timer:null,
  used:new Set(),
  task:null,
  input:'',
  history:[],

  skill:{ level:1, correctStreak:0, wrongStreak:0 },
  mistakes:[],
  taskStart:0
};

// ── ADAPTÍV PARAMÉTER ───────────────────────────────
const levelScale = () => S.skill.level;

// ── CATEGORIES ──────────────────────────────────────
const CATS = {

szorzas:{
  name:'Szorzás',
  generate(){
    const max = 3 + levelScale()*2;
    const a = rand(1,max);
    const b = rand(1,max);
    return { display:`${a} × ${b} =`, answer:String(a*b) };
  }
},

osztas:{
  name:'Osztás',
  generate(){
    const max = 3 + levelScale()*2;
    const b = rand(2,max);
    const c = rand(2,max);
    return { display:`${b*c} ÷ ${b} =`, answer:String(c) };
  }
},

tszorz:{
  name:'×10/100/1000',
  generate(){
    const level = levelScale();
    const dec = level <=2 ? 1 : level<=4 ? 2 : 3;
    const mult = [10,100,1000][rand(0,Math.min(2,Math.floor(level/2)))];

    const scale = Math.pow(10,dec);
    const aInt = rand(1, 10*scale-1);
    const a = aInt/scale;

    return {
      display:`${fmt(a)} × ${mult} =`,
      answer: fmt(a*mult)
    };
  }
},

toszt:{
  name:'Tizedes ÷ egész',
  generate(){
    const level = levelScale();
    const dec = level<=2?1:2;
    const scale = Math.pow(10,dec);

    const c = rand(1,99);
    const b = rand(1,5+level);
    const a = (c*b)/scale;

    return {
      display:`${fmt(a)} ÷ ${b} =`,
      answer: fmt(c/scale)
    };
  }
},

toszt10:{
  name:'÷10/100/1000',
  generate(){
    const level = levelScale();
    const dec = level<=2?1:3;
    const scale = Math.pow(10,dec);

    const a = rand(1,999*scale)/scale;
    const div = [10,100,1000][rand(0,Math.min(2,Math.floor(level/2)))];

    return {
      display:`${fmt(a)} ÷ ${div} =`,
      answer: fmt(a/div)
    };
  }
},

tort:{
  name:'Tört → tizedes',
  generate(){
    const n = rand(1,99);
    return {
      display:`${n} ÷ 100 =`,
      answer: fmt(n/100)
    };
  }
}

};

// ── SCREENS ─────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ── GAME START ──────────────────────────────────────
function startGame(catId){
  Object.assign(S,{
    cat:catId,
    score:0,
    timeLeft:60,
    used:new Set(),
    history:[],
    mistakes:[],
    skill:{level:1,correctStreak:0,wrongStreak:0}
  });

  nextTask();
  updateScore();
  updateTimer();

  showScreen('game');

  clearInterval(S.timer);
  S.timer=setInterval(()=>{
    S.timeLeft--;
    updateTimer();
    if(S.timeLeft<=0) endGame();
  },1000);
}

// ── TASK ────────────────────────────────────────────
function nextTask(){

  if(S.mistakes.length>0 && Math.random()<0.3){
    S.task = S.mistakes[rand(0,S.mistakes.length-1)];
  }else{
    S.task = CATS[S.cat].generate();
  }

  S.input='';
  document.getElementById('answer-text').textContent='';
  document.getElementById('task-eq').textContent=S.task.display;

  S.taskStart = performance.now();
}

// ── INPUT ───────────────────────────────────────────
function handleKey(val){

  if(val==='OK'){ submit(); return; }

  if(val==='DEL'){
    S.input=S.input.slice(0,-1);
  }else{
    if(S.input.length<8) S.input+=val;
  }

  document.getElementById('answer-text').textContent=S.input;
}

// ── SUBMIT ──────────────────────────────────────────
function submit(){

  if(!S.input) return;

  const user = parseFloat(S.input.replace(',','.'));
  const correctVal = parseFloat(S.task.answer);

  const correct = fmt(user) === fmt(correctVal);

  const reaction = performance.now()-S.taskStart;

  S.history.push({...S.task, correct, reaction});

  if(correct){

    S.skill.correctStreak++;
    S.skill.wrongStreak=0;

    if(S.skill.correctStreak>=5){
      S.skill.level++;
      S.skill.correctStreak=0;
    }

    let pts=1;
    if(reaction<2000) pts++;
    if(S.skill.level>=4) pts++;

    S.score+=pts;

  }else{

    S.skill.wrongStreak++;
    S.skill.correctStreak=0;

    S.mistakes.push(S.task);

    if(S.skill.wrongStreak>=3){
      S.skill.level--;
      S.skill.wrongStreak=0;
    }
  }

  S.skill.level=Math.max(1,Math.min(5,S.skill.level));

  updateScore();
  nextTask();
}

// ── UI ──────────────────────────────────────────────
function updateScore(){
  document.getElementById('score-num').textContent=S.score;
}

function updateTimer(){
  document.getElementById('timer-num').textContent=S.timeLeft;
}

// ── END ─────────────────────────────────────────────
function endGame(){

  clearInterval(S.timer);

  const total=S.history.length;
  const correct=S.history.filter(h=>h.correct).length;
  const avg = total?Math.round(S.history.reduce((a,b)=>a+b.reaction,0)/total):0;

  document.getElementById('result-num').textContent=S.score;

  const stats = `
  Pontosság: ${Math.round(correct/total*100)}%<br>
  Átlagidő: ${avg} ms<br>
  Szint: ${S.skill.level}
  `;

  document.getElementById('result-hs-val').innerHTML = stats;

  showScreen('result');
}

// ── EVENTS ──────────────────────────────────────────
document.querySelectorAll('.cat-btn').forEach(btn=>{
  btn.onclick=()=>startGame(btn.dataset.cat);
});

document.querySelectorAll('.kb-btn').forEach(btn=>{
  btn.onclick=()=>handleKey(btn.textContent==='⌫'?'DEL':btn.textContent);
});

document.getElementById('btn-retry').onclick=()=>startGame(S.cat);
document.getElementById('btn-home').onclick=()=>showScreen('home');

showScreen('home');

</script>
</body>
</html>
