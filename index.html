<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MatekSprint Pro - Pedagogical Optimized Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { 
      --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #252540; --text: #f0f0ff; 
      --text-dim: #8888aa; --c1: #4cc9f0; --c2: #ff9e00; --c3: #06d6a0; --c4: #ff6b9d; --c5: #ffd166;
      --danger: #ff4d6d; --ok: #06d6a0; --font-ui: 'Nunito', sans-serif; 
      --font-num: 'Space Mono', monospace; 
      --safe-top: env(safe-area-inset-top, 20px); 
      --safe-bot: env(safe-area-inset-bottom, 20px); 
      --accent: #4cc9f0;
    }
    html, body { height: 100dvh; width: 100vw; overflow: hidden; position: fixed; background: var(--bg); color: var(--text); font-family: var(--font-ui); touch-action: manipulation; }
    .stars-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; padding: var(--safe-top) 16px var(--safe-bot); transition: opacity .18s ease; }
    .scroll-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; width: 100%; -webkit-overflow-scrolling: touch; padding-bottom: 40px; }
    .hidden { opacity: 0; pointer-events: none; display: none !important; }
    
    .task-eq { font-family: var(--font-num); font-size: clamp(22px, 6vw, 38px); text-align: center; margin: 15px 0; min-height: 80px; display: flex; align-items: center; justify-content: center; width: 100%; transition: transform 0.2s; }
    .task-eq.word-problem { font-family: var(--font-ui); font-size: 19px; line-height: 1.4; font-weight: 500; padding: 0 10px; }
    
    #score-num.bump { transform: scale(1.4); color: var(--ok); transition: none; }
    #score-num { transition: all 0.3s; display: inline-block; }

    .answer-box { font-family: var(--font-num); font-size: 36px; color: var(--accent); min-height: 75px; width: 100%; max-width: 300px; background: var(--surface); border-radius: 18px; display: flex; align-items: center; justify-content: center; border: 3px solid var(--surface2); }
    .cursor { width: 3px; height: 30px; background: var(--accent); margin-left: 8px; animation: blink 0.8s infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    
    .stats-card { background: var(--surface2); width: 100%; max-width: 350px; border-radius: 15px; padding: 15px; margin-top: 25px; border: 1px solid rgba(255,255,255,0.1); }
    .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
    
    .keyboard { width: 100%; max-width: 400px; margin: 0 auto; flex-shrink: 0; padding-top: 10px; }
    .kb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .kb-btn { font-family: var(--font-num); font-size: 24px; font-weight: 700; background: var(--surface); border: 1px solid var(--surface2); border-radius: 14px; color: var(--text); height: clamp(48px, 7dvh, 60px); display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; outline: none; transition: background 0.1s; }
    .kb-btn:active { background: var(--surface2); transform: scale(0.96); }
    .kb-ok { background: var(--accent); color: #fff; grid-column: span 3; font-weight: 900; height: 65px !important; margin-top: 4px; box-shadow: 0 4px 0 color-mix(in srgb, var(--accent) 70%, black); border: none; }
    
    .cat-btn { background: var(--surface); padding: 18px; border-radius: 18px; text-align: center; font-weight: 800; border: 2px solid transparent; transition: all 0.2s; cursor: pointer; width: 100%; color: var(--text); display: flex; flex-direction: column; gap: 4px; }
    .cat-btn small { font-weight: 500; opacity: 0.6; font-size: 12px; }
    .cat-btn:active { transform: scale(0.98); background: var(--surface2); }
    
    #tip-pop { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 2px solid var(--accent); padding: 20px; border-radius: 20px; z-index: 100; display: none; text-align: center; width: 85%; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    
    #level-up { position: fixed; top: 40%; left: 0; width: 100%; text-align: center; font-size: 48px; font-weight: 900; color: var(--c5); z-index: 101; pointer-events: none; opacity: 0; transform: scale(0.5); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    #level-up.show { opacity: 1; transform: scale(1); }
  </style>
</head>
<body>
<canvas class="stars-bg" id="stars-canvas"></canvas>
<div id="tip-pop"><span id="tip-text"></span></div>
<div id="level-up">LEVEL UP! 🚀</div>

<main class="screen" id="home">
  <div class="scroll-content">
    <h1 style="margin: 40px 0 5px; font-family: var(--font-num); font-size: 38px; text-align: center; color: var(--c1);">MatekSprint</h1>
    <p style="color: var(--text-dim); margin-bottom: 25px; text-align: center;">Középiskolai előkészítő</p>
    <div id="cat-list" style="width: 100%; max-width: 350px; display: flex; flex-direction: column; gap: 12px;"></div>
    <div class="stats-card">
      <h3 style="color: var(--c5); font-size: 16px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;">📊 Sprint Történelem</h3>
      <div id="history-recent"></div>
    </div>
  </div>
</main>

<section class="screen hidden" id="game">
  <div class="scroll-content">
    <div style="display: flex; justify-content: space-between; width: 100%; font-family: var(--font-num); font-size: 24px; padding: 5px 10px;">
      <span id="score-num">0</span> <span id="timer-num">60</span>
    </div>
    <div id="task-eq" class="task-eq"></div>
    <div class="answer-box"><span id="answer-text"></span><span class="cursor"></span></div>
  </div>
  <div class="keyboard">
    <div class="kb-grid" id="kb-grid"></div>
    <button type="button" class="kb-btn kb-ok" onclick="submitAnswer()">BEKÜLDÉS</button>
  </div>
</section>

<section class="screen hidden" id="result">
  <div class="scroll-content">
    <div id="star-rating" style="font-size: 40px; margin-top: 20px;"></div>
    <h2 style="font-size: 60px; color: var(--accent); margin-top: 10px;" id="result-num">0</h2>
    <div id="res-stats" style="margin-bottom: 20px; font-weight: 700; text-align: center; line-height: 1.6;"></div>
    <button type="button" class="kb-btn kb-ok" style="max-width: 300px;" onclick="resetToHome()">VISSZA A MENÜBE</button>
    <div id="history-list" style="width: 100%; margin-top: 20px;"></div>
  </div>
</section>

<script>
const CATS = {
  szorzas: { id: 'szorzas', name:'Szorzótábla', color:'#4cc9f0', needsComma: false,
    gen: (l) => { const a=rand(2, 5+l*2), b=rand(2, 9); return {q:`${a} × ${b}`, a:(a*b).toString(), p:1} } },
  osztas: { id: 'osztas', name:'Osztás', color:'#ff9e00', needsComma: false,
    gen: (l) => { const b=rand(2, 6+l), c=rand(2, 8+l); return {q:`${b*c} ÷ ${b}`, a:c.toString(), p:1} } },
  tszorz: { id: 'tszorz', name:'Tizedes szorzás', color:'#06d6a0', needsComma: true,
    gen: (l) => {
      let a, b;
      if (l <= 1) { a = rand(2, 9) / 10; b = rand(2, 9); }
      else if (l === 2) { b = [10, 100][rand(0, 1)]; a = rand(11, 999) / 10; }
      else { a = rand(2, 12) / 10; b = rand(2, 5) / 10; }
      return { q: `${f(a)} × ${f(b)}`, a: f(a * b), p: 1 };
    } 
  },
  toszt: { id: 'toszt', name:'Tizedes osztás', color:'#ff6b9d', needsComma: true,
    gen: (l) => { const c=rand(1, 30+(l*5)), b=rand(2, 5); return {q:`${f(c*b/10)} ÷ ${b}`, a:f(c/10), p:1} } },
  tort: { id: 'tort', name:'Törtek', color:'#ffd166', needsComma: true,
    gen: (l) => { const d=[2,4,5,8,10,20,25,50][Math.min(7, l)]; const n=rand(1,d-1); return {q:`${n} / ${d}`, a:f(n/d), p:1} } }
};

const WORD_TEMPLATES = [
  { gen: () => { const b = rand(2, 5)/10; return { q: `Egy sütihez ${f(b)} kg liszt kell. Mennyi kell 3 sütihez?`, a: f(b*3), hint: "Szorzás: kg × 3", p: 5 } } },
  { gen: () => { const t = rand(15, 25)+0.5, r = rand(2, 8)/10; return { q: `Reggel ${f(t)} °C volt, délutánra nőtt ${f(r)} °C-ot. Hány fok van?`, a: f(t+r), hint: "Összeadás: reggel + növekmény", p: 5 } } },
  { gen: () => { const l = rand(10, 50)/10; return { q: `Egy ${f(l)} méteres kötelet kettévágtunk. Hány méter egy darab?`, a: f(l/2), hint: "Osztás: hossz ÷ 2", p: 5 } } }
];

let state = {
  cat: null,
  score: 0,
  time: 60,
  input: '',
  task: null,
  history: [],
  level: 1,
  startTime: 0,
  gameInterval: null,
  isSubmitting: false,
  recentTasks: [],
  mistakes: []
};

const rand = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const f = (n) => {
  const rounded = Math.round((n + Number.EPSILON) * 100) / 100;
  return rounded.toString().replace('.', ',');
};

function startGame(id) {
  if (state.gameInterval) clearInterval(state.gameInterval);
  
  state = {
    cat: id,
    score: 0,
    time: 60,
    input: '',
    history: [],
    level: 1,
    startTime: Date.now(),
    gameInterval: null,
    isSubmitting: false,
    task: null,
    recentTasks: [],
    mistakes: JSON.parse(localStorage.getItem(`mistakes_${id}`) || "[]")
  };

  document.documentElement.style.setProperty('--accent', CATS[id].color);
  document.getElementById('score-num').textContent = '0';
  document.getElementById('timer-num').textContent = '60';
  
  renderKeyboard(CATS[id].needsComma);
  showScreen('game');
  nextTask();

  state.gameInterval = setInterval(() => {
    state.time--;
    const timerEl = document.getElementById('timer-num');
    if (timerEl) timerEl.textContent = state.time;
    
    if (state.time <= 0) {
      clearInterval(state.gameInterval);
      state.gameInterval = null;
      finishGame();
    }
  }, 1000);
}

function nextTask() {
  state.input = '';
  state.isSubmitting = false;
  document.getElementById('answer-text').textContent = '';
  state.startTime = Date.now();
  
  let newTask;
  // 25% esély rontott feladat újraküldésére, ha van ilyen
  if (state.mistakes.length > 0 && Math.random() < 0.25) {
    newTask = state.mistakes.splice(rand(0, state.mistakes.length-1), 1)[0];
  } else {
    const isWord = Math.random() < 0.15;
    let attempts = 0;
    do {
      newTask = isWord ? WORD_TEMPLATES[rand(0, WORD_TEMPLATES.length-1)].gen() : CATS[state.cat].gen(state.level);
      attempts++;
    } while (state.recentTasks.includes(newTask.q) && attempts < 10);
  }

  state.task = newTask;
  state.recentTasks.push(newTask.q);
  if (state.recentTasks.length > 8) state.recentTasks.shift();
  
  const el = document.getElementById('task-eq');
  el.textContent = state.task.q;
  el.className = state.task.hint ? 'task-eq word-problem' : 'task-eq';
}

function analyzeError(ua, ca) {
  const u = parseFloat(ua.replace(',', '.'));
  const c = parseFloat(ca.replace(',', '.'));
  if (u === c * 10 || u === c / 10) return "Figyelj a tizedeshelyekre! 🧐";
  if (Math.abs(u - c) < 0.001) return "Majdnem! Csak a kerekítés/vessző...";
  return "Sebaj, menni fog! 💪";
}

function submitAnswer() {
  if (!state.input || state.isSubmitting || state.time <= 0) return;
  
  state.isSubmitting = true;
  const ok = state.input === state.task.a;
  const rt = Date.now() - state.startTime;
  
  if (ok) {
    state.score += state.task.p;
    const scoreEl = document.getElementById('score-num');
    scoreEl.textContent = state.score;
    scoreEl.classList.add('bump');
    setTimeout(() => scoreEl.classList.remove('bump'), 300);

    // Szintlépés vizualizáció
    if (state.score > 0 && state.score % 20 === 0) {
      state.level++;
      const lu = document.getElementById('level-up');
      lu.classList.add('show');
      setTimeout(() => lu.classList.remove('show'), 1500);
    }
    nextTask();
  } else {
    // Mentés későbbi gyakorláshoz
    if (!state.mistakes.find(m => m.q === state.task.q)) {
      state.mistakes.push(state.task);
      localStorage.setItem(`mistakes_${state.cat}`, JSON.stringify(state.mistakes.slice(-10)));
    }

    const tip = analyzeError(state.input, state.task.a);
    showTip(`${tip}<br><br><small>A helyes válasz: <b>${state.task.a}</b></small>`, 2000);
    
    state.history.push({ q: state.task.q, ua: state.input, a: state.task.a, ok: false, rt });
    setTimeout(nextTask, 2000);
  }
}

function showTip(text, duration) {
  const pop = document.getElementById('tip-pop');
  document.getElementById('tip-text').innerHTML = text;
  pop.style.display = 'block';
  setTimeout(() => { pop.style.display = 'none'; }, duration);
}

function finishGame() {
  const catKey = `best_${state.cat}`;
  const currentBest = parseInt(localStorage.getItem(catKey) || "0");
  let isNewRecord = false;

  if (state.score > currentBest) {
    localStorage.setItem(catKey, state.score);
    isNewRecord = true;
  }

  try {
    const rawHistory = localStorage.getItem('mateksprint_history');
    const history = rawHistory ? JSON.parse(rawHistory) : [];
    history.unshift({ 
      date: new Date().toLocaleDateString('hu-HU', {month:'short', day:'numeric'}), 
      cat: CATS[state.cat].name, 
      score: state.score 
    });
    localStorage.setItem('mateksprint_history', JSON.stringify(history.slice(0, 5)));
  } catch (e) {}
  
  showScreen('result');
  renderResult(isNewRecord);
}

function renderResult(isNewRecord) {
  document.getElementById('result-num').textContent = state.score;
  const total = state.history.length + (state.score > 0 ? state.score : 0); // Becsült total
  const acc = Math.round((state.score / (state.score + state.history.filter(h=>!h.ok).length)) * 100) || 0;
  
  const stars = state.score > 40 ? '⭐⭐⭐' : state.score > 20 ? '⭐⭐' : '⭐';
  document.getElementById('star-rating').textContent = stars;

  document.getElementById('res-stats').innerHTML = 
    `${isNewRecord ? '<b style="color:var(--c5)">🏆 ÚJ REKORD!</b><br>' : ''}` +
    `Pontosság: ${acc}% | Szint: ${state.level}`;
  
  const historyList = document.getElementById('history-list');
  historyList.innerHTML = state.history.map(h => `
    <div style="padding:12px; margin-bottom:8px; border-radius:12px; background:var(--surface); border-left:5px solid var(--danger); display:flex; justify-content:space-between;">
      <span>${h.q} = <b style="color:var(--danger)">${h.ua}</b> (Helyes: ${h.a})</span>
    </div>
  `).reverse().join('');
}

function renderHome() {
  const list = document.getElementById('cat-list');
  list.innerHTML = '';
  
  Object.values(CATS).forEach(c => {
    const best = localStorage.getItem(`best_${c.id}`) || 0;
    const b = document.createElement('button');
    b.className = 'cat-btn';
    b.innerHTML = `${c.name} <small>Egyéni csúcs: ${best} p</small>`;
    b.onclick = () => startGame(c.id);
    list.appendChild(b);
  });

  const hist = JSON.parse(localStorage.getItem('mateksprint_history') || "[]");
  document.getElementById('history-recent').innerHTML = hist.map(h => `
    <div class="history-item"><span>${h.date} - ${h.cat}</span><b>${h.score} p</b></div>
  `).join('');
  
  showScreen('home');
}

function resetToHome() {
  if (state.gameInterval) clearInterval(state.gameInterval);
  renderHome();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function renderKeyboard(withComma) {
  const kb = document.getElementById('kb-grid');
  kb.innerHTML = '';
  const keys = [1, 2, 3, 4, 5, 6, 7, 8, 9, withComma ? ',' : '', 0, '⌫'];
  
  keys.forEach(k => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'kb-btn';
    if (k === '') b.style.visibility = 'hidden';
    b.textContent = k;
    b.onclick = (e) => {
      e.preventDefault();
      if (k === '⌫') state.input = state.input.slice(0, -1);
      else if (k !== '' && state.input.length < 8) {
        if (k === ',' && state.input.includes(',')) return;
        state.input += k;
      }
      document.getElementById('answer-text').textContent = state.input;
    };
    kb.appendChild(b);
  });
}

// Fizikai billentyűzet
window.addEventListener('keydown', (e) => {
  if (document.getElementById('game').classList.contains('hidden')) return;
  if (e.key >= '0' && e.key <= '9') {
    if (state.input.length < 8) state.input += e.key;
  } else if ((e.key === ',' || e.key === '.') && !state.input.includes(',')) {
    state.input += ',';
  } else if (e.key === 'Backspace') {
    state.input = state.input.slice(0, -1);
  } else if (e.key === 'Enter') {
    submitAnswer();
  }
  document.getElementById('answer-text').textContent = state.input;
});

// Csillagos háttér
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function initStars() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = Array.from({length: 100}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 0.5 + 0.2
  }));
}

function animateStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#ffffff33';
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > canvas.height) s.y = 0;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
  requestAnimationFrame(animateStars);
}

window.addEventListener('resize', initStars);
window.onload = () => { renderHome(); initStars(); animateStars(); };
</script>
</body>
</html>
