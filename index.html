<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MatekSprint Pro - Full Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ... (Stílusok: az előzőekben megbeszélt neon/dark téma + hiba indikátorok) ... */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0f0f1a; --surface:#1a1a2e; --surface2:#252540; --text:#f0f0ff; --text-dim:#8888aa; --c1:#4cc9f0; --c2:#ff9e00; --c3:#06d6a0; --c4:#ff6b9d; --c5:#ffd166; --danger:#ff4d6d; --ok:#06d6a0; --font-ui:'Nunito', sans-serif; --font-num:'Space Mono', monospace; --accent:#4cc9f0; }
    body { height: 100vh; font-family: var(--font-ui); background: var(--bg); color: var(--text); overflow: hidden; }
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; transition: 0.2s; overflow-y: auto; }
    .screen.hidden { opacity: 0; pointer-events: none; transform: scale(.96); }
    .logo { font-family: var(--font-num); font-size: 32px; font-weight: 700; background: linear-gradient(135deg, var(--c1), var(--c4)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 20px 0; }
    .categories { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
    .cat-btn { background: var(--surface); border: 2px solid var(--surface2); border-radius: 16px; padding: 15px; cursor: pointer; transition: 0.1s; }
    .cat-btn:active { transform: scale(0.98); }
    .cat-name { font-weight: 800; font-size: 15px; }
    .err-analysis { display: flex; gap: 4px; margin-top: 8px; }
    .err-dot { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: var(--surface2); color: var(--text-dim); font-family: var(--font-num); border: 1px solid transparent; }
    .err-dot.active { background: rgba(255, 77, 109, 0.15); color: var(--danger); border-color: var(--danger); font-weight: 700; }
    .task-eq { font-family: var(--font-num); font-size: clamp(32px, 8vw, 48px); font-weight: 700; margin: 30px 0; }
    .answer-box { font-family: var(--font-num); font-size: 36px; background: var(--surface); padding: 12px 25px; border-radius: 15px; border: 3px solid var(--accent); min-width: 140px; text-align: center; margin-bottom: 20px; }
    .kb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 320px; }
    .kb-btn { background: var(--surface); border: 1px solid var(--surface2); color: white; padding: 18px; border-radius: 12px; font-family: var(--font-num); font-size: 22px; cursor: pointer; }
    .kb-ok { background: var(--accent); grid-column: span 1; }
    .history-item { display: flex; width: 100%; background: var(--surface); margin-bottom: 6px; padding: 12px; border-radius: 10px; font-size: 14px; border-left: 4px solid transparent; }
    .err-tag { font-size: 10px; background: var(--surface2); color: var(--danger); padding: 2px 5px; border-radius: 4px; margin-left: 8px; font-weight: 700; }
    .stars-bg { position: fixed; inset: 0; z-index: -1; opacity: 0.4; }
  </style>
</head>
<body>
<canvas class="stars-bg" id="stars-canvas"></canvas>

<div class="screen" id="home">
  <div class="logo">MatekSprint Pro</div>
  <div class="categories" id="cat-list"></div>
</div>

<div class="screen hidden" id="game">
  <div style="width:100%; display:flex; justify-content:space-between; font-family:var(--font-num); font-weight:700;">
    <div id="score-num" style="color:var(--ok)">0</div>
    <div id="timer-num">60</div>
  </div>
  <div class="task-eq" id="task-eq"></div>
  <div class="answer-box" id="answer-box"><span id="answer-text"></span></div>
  <div class="kb-grid" id="kb-grid"></div>
</div>

<div class="screen hidden" id="result">
  <h1 id="result-num" style="font-size: 72px; color:var(--accent)">0</h1>
  <div id="res-stats" style="margin-bottom: 20px; color:var(--text-dim)"></div>
  <button onclick="renderHome()" style="width:100%; max-width:300px; padding:18px; border-radius:15px; background:var(--accent); border:none; color:white; font-weight:800; font-size:18px; cursor:pointer;">Vissza a menübe</button>
  <div id="history-list" style="width: 100%; max-width:400px; margin-top:25px;"></div>
</div>

<script>
// --- VISSZAÁLLÍTOTT ÉS BŐVÍTETT KATEGÓRIÁK ---
const CATS = {
  szorzas: { name:'Szorzótábla', color:'#4cc9f0', bonusTime: 2000, 
    gen: (l) => { const a=rand(2, 5+l*2), b=rand(2, 9); return {q:`${a} × ${b}`, a:fmt(a*b), type:'MUL'} } },
  osztas: { name:'Osztás', color:'#ff9e00', bonusTime: 3500,
    gen: (l) => { const b=rand(2, 6+l), c=rand(2, 8+l); return {q:`${b*c} ÷ ${b}`, a:fmt(c), type:'DIV', base:b*c, div:b} } },
  tszorz: { name:'Tizedes szorzás', color:'#06d6a0', bonusTime: 3000,
    gen: (l) => { const m=[10,100,1000][rand(0,Math.min(2,l-1))]; const v=rand(11,99)/10; return {q:`${v} × ${m}`, a:fmt(v*m), type:'DEC_MUL'} } },
  toszt: { name:'Tizedes osztás', color:'#ff6b9d', bonusTime: 4000,
    gen: (l) => { const c=rand(1,30+(l*10)), b=rand(2,5); return {q:`${fmt(c*b/10)} ÷ ${b}`, a:fmt(c/10), type:'DEC_DIV'} } },
  tort: { name:'Törtek (Tizedesbe)', color:'#ffd166', bonusTime: 4500,
    gen: (l) => { const d=[2,4,5,8,10,20,25][rand(0,Math.min(6,l))]; const n=rand(1,d-1); return {q:`${n} / ${d}`, a:fmt(n/d), type:'FRAC'} } }
};

let S = { cat:null, score:0, time:60, timer:null, task:null, input:'', history:[], level:1, start:0 };

const rand = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const fmt = n => parseFloat(n.toFixed(8)).toString();
const getStats = (id) => JSON.parse(localStorage.getItem('stats_'+id)) || { hs:0, avgT:0, acc:0, plays:0, errors: { M:0, D:0, R:0, F:0 } };

function renderHome() {
  const container = document.getElementById('cat-list');
  container.innerHTML = '';
  Object.keys(CATS).forEach(id => {
    const stats = getStats(id);
    const btn = document.createElement('div');
    btn.className = 'cat-btn';
    btn.style.borderLeft = `6px solid ${CATS[id].color}`;
    
    const errMap = { M:'Matek', D:'Tizedes', R:'Váltás', F:'Forma' };
    let errHtml = '<div class="err-analysis">';
    for(let code in errMap) {
      const count = stats.errors[code] || 0;
      errHtml += `<div class="err-dot ${count > 2 ? 'active' : ''}" title="${errMap[code]}: ${count}">${code}</div>`;
    }
    errHtml += '</div>';

    btn.innerHTML = `
      <div class="cat-name">${CATS[id].name}</div>
      <div class="cat-hs">Rekord: <b>${stats.hs}</b> | Átlag: <b>${stats.avgT}ms</b></div>
      ${errHtml}
    `;
    btn.onclick = () => startGame(id);
    container.appendChild(btn);
  });
  showScreen('home');
}

function getErrorCode(input, correct, task) {
  const inp = input.replace(',', '.');
  const userNum = parseFloat(inp);
  if (isNaN(userNum)) return "F";
  if (task.type === 'DIV' && (userNum === task.base || userNum === task.div)) return "R";
  const s1 = inp.replace('.', '').replace(/^0+/, '');
  const s2 = correct.replace('.', '').replace(/^0+/, '');
  if (s1 === s2 && inp !== correct) return "D";
  return "M";
}

function submit() {
  if (!S.input) return;
  const rt = performance.now() - S.start;
  const cleanInput = S.input.replace(',', '.');
  const isCorrect = fmt(parseFloat(cleanInput)) === S.task.a;
  let errorCode = isCorrect ? null : getErrorCode(S.input, S.task.a, S.task);

  S.history.push({ q: S.task.q, ua: S.input, ca: S.task.a, ok: isCorrect, rt, err: errorCode });

  if (isCorrect) {
    S.score += (rt < CATS[S.cat].bonusTime) ? 2 : 1;
    document.getElementById('score-num').textContent = S.score;
  }
  nextTask();
}

function startGame(id) {
  S = { cat:id, score:0, time:60, timer:null, task:null, input:'', history:[], level:1, start:0 };
  document.documentElement.style.setProperty('--accent', CATS[id].color);
  rebuildKeyboard(id.includes('t') || id === 'tort');
  nextTask();
  showScreen('game');
  S.timer = setInterval(() => {
    S.time--;
    document.getElementById('timer-num').textContent = S.time;
    if (S.time <= 0) endGame();
  }, 1000);
}

function nextTask() {
  S.input = ''; document.getElementById('answer-text').textContent = '';
  S.task = CATS[S.cat].gen(S.level);
  document.getElementById('task-eq').textContent = S.task.q + " = ?";
  S.start = performance.now();
}

function endGame() {
  clearInterval(S.timer);
  const stats = getStats(S.cat);
  const correct = S.history.filter(h => h.ok).length;
  const acc = S.history.length ? Math.round(correct/S.history.length*100) : 0;
  const avg = S.history.length ? Math.round(S.history.reduce((a,b)=>a+b.rt,0)/S.history.length) : 0;

  const currentErrors = { ...stats.errors };
  S.history.forEach(h => { if(h.err) currentErrors[h.err] = (currentErrors[h.err] || 0) + 1; });

  localStorage.setItem('stats_'+S.cat, JSON.stringify({
    hs: Math.max(stats.hs, S.score),
    avgT: stats.plays === 0 ? avg : Math.round((stats.avgT + avg) / 2),
    acc: stats.plays === 0 ? acc : Math.round((stats.acc + acc) / 2),
    plays: (stats.plays || 0) + 1,
    errors: currentErrors
  }));

  document.getElementById('result-num').textContent = S.score;
  document.getElementById('res-stats').textContent = `Pontosság: ${acc}% | Átlagidő: ${avg}ms`;
  renderHistory();
  showScreen('result');
}

function handleKey(v) {
  if (v === 'OK') submit();
  else if (v === 'DEL') S.input = S.input.slice(0,-1);
  else if (S.input.length < 8) S.input += v;
  document.getElementById('answer-text').textContent = S.input;
}

function rebuildKeyboard(dot) {
  const grid = document.getElementById('kb-grid'); grid.innerHTML = '';
  [1,2,3,4,5,6,7,8,9,0].forEach(n => {
    const b = document.createElement('button'); b.className='kb-btn'; b.textContent=n;
    b.onclick=()=>handleKey(n.toString()); grid.appendChild(b);
  });
  if(dot) { 
    const d=document.createElement('button'); d.className='kb-btn'; d.textContent=','; 
    d.onclick=()=>handleKey('.'); grid.appendChild(d); 
  }
  const del=document.createElement('button'); del.className='kb-btn'; del.textContent='⌫'; del.onclick=()=>handleKey('DEL'); grid.appendChild(del);
  const ok=document.createElement('button'); ok.className='kb-btn kb-ok'; ok.textContent='OK'; ok.onclick=()=>handleKey('OK'); grid.appendChild(ok);
}

function renderHistory() {
  const container = document.getElementById('history-list'); container.innerHTML = '';
  S.history.slice(-10).reverse().forEach(h => {
    const item = document.createElement('div'); 
    item.className = `history-item ${h.ok?'correct':''}`;
    item.style.borderLeftColor = h.ok ? 'var(--ok)' : 'var(--danger)';
    item.innerHTML = `
      <div style="flex:1">${h.q} = <b>${h.ua}</b> ${!h.ok ? `<span style="opacity:0.5"> (${h.ca})</span>` : ''}</div>
      ${h.err ? `<span class="err-tag">${h.err}</span>` : ''}
    `;
    container.appendChild(item);
  });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// Csillagos háttér animáció
(function(){
  const c = document.getElementById('stars-canvas'); const ctx = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  for (let i=0; i<80; i++) {
    ctx.beginPath(); ctx.arc(Math.random()*c.width, Math.random()*c.height, Math.random()*1.5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.5})`; ctx.fill();
  }
})();

renderHome();
</script>
</body>
</html>
