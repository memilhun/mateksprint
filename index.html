<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MatekSprint">
  <meta name="theme-color" content="#0f0f1a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>MatekSprint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f1a;
      --surface:  #1a1a2e;
      --surface2: #252540;
      --text:     #f0f0ff;
      --text-dim: #8888aa;
      --c1: #4cc9f0;
      --c2: #ff9e00;
      --c3: #06d6a0;
      --c4: #ff6b9d;
      --danger: #ff4d6d;
      --ok:     #06d6a0;
      --font-ui:  'Nunito', sans-serif;
      --font-num: 'Space Mono', monospace;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
      --accent: #4cc9f0;
    }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
    }

    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center;
      padding-top: calc(var(--safe-top) + 12px);
      padding-bottom: calc(var(--safe-bot) + 12px);
      padding-left: 16px; padding-right: 16px;
      transition: opacity .18s ease, transform .18s ease;
      overflow: hidden;
    }
    .screen.hidden { opacity: 0; pointer-events: none; transform: scale(.96); }

    #home { justify-content: flex-start; }
    .home-header { width: 100%; text-align: center; padding: 18px 0 22px; }
    .logo {
      font-family: var(--font-num);
      font-size: clamp(28px, 8vw, 38px); font-weight: 700; letter-spacing: -1px;
      background: linear-gradient(135deg, #4cc9f0, #ff6b9d);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-sub, .category-group h2 { font-size: 13px; color: var(--text-dim); margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }

    .categories { width: 100%; display: flex; flex-direction: column; gap: 20px; }
    .category-group { display: flex; flex-direction: column; gap: 10px; }
    .category-group-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .cat-btn {
      --c: var(--c1);
      background: var(--surface);
      border: 2px solid color-mix(in srgb, var(--c) 40%, transparent);
      border-radius: 20px; padding: 18px 14px 16px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      transition: transform .12s; -webkit-user-select: none; user-select: none;
      position: relative; overflow: hidden;
    }
    .cat-btn::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--c) 18%, transparent), transparent 70%);
    }
    .cat-btn:active { transform: scale(.95); }
    .cat-btn[data-cat="szorzas"] { --c: var(--c1); }
    .cat-btn[data-cat="osztas"]  { --c: var(--c2); }
    .cat-btn[data-cat="tszorz"]  { --c: var(--c3); }
    .cat-btn[data-cat="toszt"]   { --c: var(--c4); }
    .cat-btn[data-cat="toszt10"] { --c: var(--c4); }
    .cat-btn[data-cat="tort"]    { --c: #ffd166; }

    .cat-icon { font-family: var(--font-num); font-size: 28px; font-weight: 700; color: var(--c); line-height: 1; }
    .cat-name { font-size: 11px; font-weight: 800; text-align: center; color: var(--text); line-height: 1.3; }
    .cat-hs   { font-family: var(--font-num); font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .cat-hs span { color: var(--c); font-weight: 700; }

    #game { justify-content: space-between; gap: 8px; }
    .game-topbar { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 6px 4px; }
    .score-display { display: flex; flex-direction: column; align-items: flex-start; }
    .score-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
    .score-num   { font-family: var(--font-num); font-size: 36px; font-weight: 700; color: var(--text); line-height: 1; transition: transform .1s; }
    .score-num.bump { transform: scale(1.25); }
    .timer-wrap  { display: flex; flex-direction: column; align-items: flex-end; }
    .timer-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
    .timer-num   { font-family: var(--font-num); font-size: 44px; font-weight: 700; color: var(--text); line-height: 1; transition: color .3s; }
    .timer-num.danger { color: var(--danger); }

    .progress-bar  { width: 100%; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; width: 100%; background: var(--accent); border-radius: 2px; transition: width 1s linear, background-color .3s; }

    .task-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; width: 100%; }
    .cat-badge { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); opacity: .7; }
    .task-eq   { font-family: var(--font-num); font-size: clamp(30px, 9vw, 46px); font-weight: 700; color: var(--text); text-align: center; line-height: 1.1; }

    .answer-box {
      font-family: var(--font-num); font-size: clamp(34px, 10vw, 50px); font-weight: 700; color: var(--accent);
      min-width: 140px; min-height: 64px; text-align: center;
      background: var(--surface);
      border: 2.5px solid color-mix(in srgb, var(--accent) 35%, transparent);
      border-radius: 16px; display: flex; align-items: center; justify-content: center;
      padding: 0 20px; letter-spacing: 2px; transition: border-color .15s;
    }
    .answer-box.has-input { border-color: var(--accent); }

    .cursor {
      display: inline-block; width: 3px; height: 1em;
      background: var(--accent); margin-left: 3px;
      animation: blink .8s step-end infinite; border-radius: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .keyboard { width: 100%; max-width: 340px; }
    .kb-grid  { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

    .kb-btn {
      font-family: var(--font-num); font-size: 22px; font-weight: 700;
      background: var(--surface); border: 2px solid var(--surface2);
      border-radius: 14px; color: var(--text); cursor: pointer;
      aspect-ratio: 1.4; display: flex; align-items: center; justify-content: center;
      -webkit-user-select: none; user-select: none; transition: background .08s, transform .08s;
    }
    .kb-btn:active, .kb-btn.pressed { background: var(--surface2); transform: scale(.92); }
    .kb-btn.kb-ok  { background: var(--accent); border-color: var(--accent); color: #fff; font-size: 18px; letter-spacing: 1px; }
    .kb-btn.kb-ok:active, .kb-btn.kb-ok.pressed { background: color-mix(in srgb, var(--accent) 75%, #000); }
    .kb-btn.kb-del { font-size: 20px; }
    .kb-btn.kb-dot { font-size: 28px; font-weight: 900; }

    #result { justify-content: flex-start; overflow-y: auto; -webkit-overflow-scrolling: touch; gap: 0; }
    .result-top {
      width: 100%; display: flex; flex-direction: column; align-items: center;
      gap: 14px; padding-bottom: 20px; flex-shrink: 0;
    }
    .result-badge { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); opacity: .8; padding-top: 8px; }
    .result-score { text-align: center; }
    .result-num   { font-family: var(--font-num); font-size: clamp(60px, 18vw, 90px); font-weight: 700; color: var(--accent); line-height: 1; }
    .result-label { font-size: 16px; color: var(--text-dim); margin-top: 4px; }
    .stars         { display: flex; gap: 8px; font-size: 28px; }

    .result-hs-wrap { background: var(--surface); border-radius: 16px; padding: 14px 32px; text-align: center; width: 100%; max-width: 280px; }
    .result-hs-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); }
    .result-hs-val   { font-family: var(--font-num); font-size: 26px; font-weight: 700; color: var(--text); margin-top: 4px; }
    .new-record      { font-size: 13px; font-weight: 800; color: #ffd60a; text-transform: uppercase; letter-spacing: 1px; animation: pulse 1s ease-in-out infinite; margin-top: 4px; }

    .result-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; }
    .btn-primary {
      font-family: var(--font-ui); font-size: 18px; font-weight: 800;
      background: var(--accent); color: #fff; border: none; border-radius: 16px; padding: 16px;
      cursor: pointer; -webkit-user-select: none; user-select: none; transition: transform .1s;
    }
    .btn-primary:active { transform: scale(.96); }
    .btn-secondary {
      font-family: var(--font-ui); font-size: 16px; font-weight: 700;
      background: var(--surface); color: var(--text-dim);
      border: 2px solid var(--surface2); border-radius: 16px; padding: 14px;
      cursor: pointer; -webkit-user-select: none; user-select: none; transition: transform .1s;
    }

    .history-wrap { width: 100%; flex-shrink: 0; padding-bottom: 24px; margin-top: 20px;}
    .history-title {
      font-size: 12px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 10px; padding-left: 4px;
    }
    .history-list { display: flex; flex-direction: column; gap: 7px; width: 100%; }
    .history-item {
      display: flex; align-items: center;
      background: var(--surface); border-radius: 12px;
      padding: 10px 12px; border-left: 4px solid transparent; gap: 8px;
    }
    .history-item.correct { border-left-color: var(--ok); }
    .history-item.wrong   { border-left-color: var(--danger); }
    .history-icon { font-size: 15px; flex-shrink: 0; width: 20px; text-align: center; }
    .history-item.correct .history-icon { color: var(--ok); }
    .history-item.wrong   .history-icon { color: var(--danger); }
    .history-eq { font-family: var(--font-num); font-size: 14px; color: var(--text); flex: 1; min-width: 0; }
    .history-user { font-family: var(--font-num); font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .history-item.correct .history-user { color: var(--ok); }
    .history-item.wrong   .history-user { color: var(--danger); }
    .history-arrow { font-size: 12px; color: var(--text-dim); flex-shrink: 0; }
    .history-correct-ans { font-family: var(--font-num); font-size: 14px; font-weight: 700; color: var(--text); flex-shrink: 0; }

    .stars-bg { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
  </style>
</head>
<body>
<canvas class="stars-bg" id="stars-canvas"></canvas>

<div class="screen" id="home">
  <div class="home-header">
    <div class="logo">MatekSprint</div>
    <div class="logo-sub">Válassz kategóriát!</div>
  </div>
  <div class="categories">
    <div class="category-group">
      <h2>Alapműveletek</h2>
      <div class="category-group-buttons">
        <button class="cat-btn" data-cat="szorzas">
          <div class="cat-icon">×</div>
          <div class="cat-name">Szorzótábla</div>
          <div class="cat-hs">Rekord: <span id="hs-szorzas">—</span></div>
        </button>
        <button class="cat-btn" data-cat="osztas">
          <div class="cat-icon">÷</div>
          <div class="cat-name">Osztás</div>
          <div class="cat-hs">Rekord: <span id="hs-osztas">—</span></div>
        </button>
      </div>
    </div>

    <div class="category-group">
      <h2>Tizedestörtek</h2>
      <div class="category-group-buttons">      
        <button class="cat-btn" data-cat="tszorz">
          <div class="cat-icon">.×10</div>
          <div class="cat-name">Szorzás 10, 100, 1000-rel</div>
          <div class="cat-hs">Rekord: <span id="hs-tszorz">—</span></div>
        </button>
        <button class="cat-btn" data-cat="toszt">
          <div class="cat-icon">.÷</div>
          <div class="cat-name">Tizedes­törtek osztása</div>
          <div class="cat-hs">Rekord: <span id="hs-toszt">—</span></div>
        </button>
        <button class="cat-btn" data-cat="toszt10">
          <div class="cat-icon">.÷10</div>
          <div class="cat-name">Osztás 10/100/1000-rel</div>
          <div class="cat-hs">Rekord: <span id="hs-toszt10">—</span></div>
        </button>
        <button class="cat-btn" data-cat="tort">
          <div class="cat-icon">½</div>
          <div class="cat-name">Törtek → tizedestört</div>
          <div class="cat-hs">Rekord: <span id="hs-tort">—</span></div>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="screen hidden" id="game">
  <div class="game-topbar">
    <div class="score-display">
      <div class="score-label">Pont</div>
      <div class="score-num" id="score-num">0</div>
    </div>
    <div class="timer-wrap">
      <div class="timer-label">Idő</div>
      <div class="timer-num" id="timer-num">60</div>
    </div>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div class="task-area">
    <div class="cat-badge" id="cat-badge"></div>
    <div class="task-eq"   id="task-eq"></div>
    <div class="answer-box" id="answer-box">
      <span id="answer-text"></span><span class="cursor"></span>
    </div>
  </div>
  <div class="keyboard">
    <div class="kb-grid" id="kb-grid"></div>
  </div>
</div>

<div class="screen hidden" id="result">
  <div class="result-top">
    <div class="result-badge" id="result-cat-badge"></div>
    <div class="result-score">
      <div class="result-num" id="result-num">0</div>
      <div class="result-label">feladatot oldottál meg!</div>
    </div>
    <div class="stars" id="result-stars"></div>
    <div class="result-hs-wrap">
      <div class="result-hs-label">Eddigi legjobb</div>
      <div class="result-hs-val" id="result-hs-val">—</div>
      <div id="stats-area"></div>
      <div class="new-record hidden" id="new-record">🏆 Új rekord!</div>
    </div>
    <div class="result-btns">
      <button class="btn-primary"   id="btn-retry">Újra!</button>
      <button class="btn-secondary" id="btn-home">Főmenü</button>
    </div>
  </div>
  <div class="history-wrap">
    <div class="history-title">Feladatok áttekintése</div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<script>
// --- STARFIELD ---
(function(){
  const c = document.getElementById('stars-canvas');
  const ctx = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  for (let i = 0; i < 80; i++) {
    ctx.beginPath();
    ctx.arc(Math.random()*c.width, Math.random()*c.height, Math.random()*1.5+.5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${Math.random()*.25+.05})`;
    ctx.fill();
  }
})();

// --- HELPERS ---
const rand = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const fmtResult = n => parseFloat(n.toFixed(8)).toString();

function tryGen(used, maxUniq, fn) {
  if (used.size >= maxUniq * 0.9) used.clear();
  let t, tries = 0;
  do { t = fn(); tries++; } while (used.has(t.key) && tries < 60);
  used.add(t.key);
  return t;
}

// --- CATEGORIES ---
const CATS = {
  szorzas: {
    name:'Szorzótábla', color:'#4cc9f0', hsKey:'hs_szorzas', hasDot:false, maxUniq:150,
    generate(u, level) {
      return tryGen(u, 150, () => {
        const max = 4 + level * 2; // 6..14
        const a=rand(1, max), b=rand(1, 9);
        return { display:`${a} × ${b} =`, answer:String(a*b), key:`${a}x${b}` };
      });
    }
  },
  osztas: {
    name:'Osztás', color:'#ff9e00', hsKey:'hs_osztas', hasDot:false, maxUniq:100,
    generate(u, level) {
      return tryGen(u, 100, () => {
        const maxDiv = 5 + level; // 6..10
        const b=rand(2, maxDiv), c=rand(2, 9 + level);
        return { display:`${b*c} ÷ ${b} =`, answer:String(c), key:`${b*c}d${b}` };
      });
    }
  },
  tszorz: {
    name:'Szorzás 10, 100, 1000-rel', color:'#06d6a0', hsKey:'hs_tszorz', hasDot:true, maxUniq:600,
    generate(u, level) {
      return tryGen(u, 600, () => {
        const multipliers = [10, 100, 1000];
        const b = multipliers[rand(0, Math.min(2, level-1))];
        const dec = level > 3 ? rand(2,3) : rand(1,2);
        const scale = Math.pow(10, dec);
        let aInt;
        do { aInt = rand(1, 10*scale - 1); } while (aInt % 10 === 0);
        const aStr = (aInt / scale).toFixed(dec);
        const resultInt = aInt * b;
        const ansStr = fmtResult(resultInt / scale);
        return { display:`${aStr} × ${b} =`, answer:ansStr, key:`${aStr}x${b}` };
      });
    }
  },
  toszt: {
    name:'Tizedes ÷ egész', color:'#ff6b9d', hsKey:'hs_toszt', hasDot:true, maxUniq:500,
    generate(u, level) {
      return tryGen(u, 500, () => {
        const c=rand(1, 50 + (level*10)), b=rand(1, 5 + level);
        const aTenths = c * b;
        const aRaw = aTenths / 10;
        const aStr = Number.isInteger(aRaw) ? aRaw.toFixed(1) : fmtResult(aRaw);
        const ansStr = fmtResult(c / 10);
        return { display:`${aStr} ÷ ${b} =`, answer:ansStr, key:`${aStr}d${b}` };
      });
    }
  },
  toszt10: {
    name:'Osztás 10, 100, 1000-rel', color:'#ff6b9d', hsKey:'hs_toszt10', hasDot:true, maxUniq:600,
    generate(u, level) {
      return tryGen(u, 600, () => {
        const b = [10, 100, 1000][rand(0, Math.min(2, level-1))];
        const dec = rand(1, Math.min(3, level));
        const scale = Math.pow(10, dec);
        const aInt = rand(10, 500 * scale);
        const aRaw = aInt / scale;
        const aStr = fmtResult(aRaw);
        const ansStr = fmtResult(aRaw / b);
        return { display:`${aStr} ÷ ${b} =`, answer:ansStr, key:`${aStr}d${b}` };
      });
    }
  },
  tort: {
    name:'Törtek → tizedestört', color:'#ffd166', hsKey:'hs_tort', hasDot:true, maxUniq:500,
    generate(u, level) {
      return tryGen(u, 500, () => {
        let num, den, val;
        while (true) {
          const n = rand(1, 100 + (level * 50));
          val = n / 100;
          num = n; den = 100;
          const gcd = (a, b) => b ? gcd(b, a % b) : a;
          const g = gcd(num, den);
          num /= g; den /= g;
          if (den !== 1 && val < (1 + level)) break;
        }
        return { display: `${num} ÷ ${den} =`, answer: fmtResult(val), key: `${num}/${den}` };
      });
    }
  }
};

// --- STORAGE ---
const loadHS = key => { try { return parseInt(localStorage.getItem(key))||0; } catch { return 0; }};
const saveHS = (key,v) => { try { localStorage.setItem(key,String(v)); } catch {} };

// --- STATE ---
let S = { 
  cat:null, score:0, timeLeft:60, timer:null, used:new Set(), 
  task:null, input:'', history:[],
  skill: { level: 1, correctStreak: 0, wrongStreak: 0 },
  mistakes: [], taskStart: 0
};

// --- SCREENS ---
const setAccent = c => document.documentElement.style.setProperty('--accent', c);
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// --- CORE LOGIC ---
function initHome() {
  setAccent('#4cc9f0');
  for (const [id,cfg] of Object.entries(CATS)) {
    const hs = loadHS(cfg.hsKey);
    document.getElementById(`hs-${id}`).textContent = hs > 0 ? hs+' pont' : '—';
  }
  showScreen('home');
}

function startGame(catId) {
  const cfg = CATS[catId];
  setAccent(cfg.color);
  Object.assign(S, { 
    cat:catId, score:0, timeLeft:60, used:new Set(), 
    input:'', history:[], mistakes: [],
    skill: { level:1, correctStreak:0, wrongStreak:0 }
  });
  rebuildKeyboard(cfg.hasDot);
  document.getElementById('cat-badge').textContent = cfg.name;
  updateScore(); updateTimer(); updateProgress();
  nextTask();
  showScreen('game');
  clearInterval(S.timer);
  S.timer = setInterval(tick, 1000);
}

function tick() {
  S.timeLeft--;
  updateTimer(); updateProgress();
  if (S.timeLeft <= 0) endGame();
}

function updateTimer() {
  const el = document.getElementById('timer-num');
  el.textContent = S.timeLeft;
  el.classList.toggle('danger', S.timeLeft <= 10);
}

function updateProgress() {
  const f = document.getElementById('progress-fill');
  f.style.width = (S.timeLeft/60*100)+'%';
  f.style.backgroundColor = S.timeLeft <= 10 ? 'var(--danger)' : 'var(--accent)';
}

function updateScore() { document.getElementById('score-num').textContent = S.score; }

function nextTask() {
  S.input = ''; 
  updateAnswerBox();
  
  if (S.mistakes.length > 0 && Math.random() < 0.3) {
    S.task = S.mistakes[rand(0, S.mistakes.length - 1)];
  } else {
    S.task = CATS[S.cat].generate(S.used, S.skill.level);
  }

  document.getElementById('task-eq').textContent = S.task.display;
  S.taskStart = performance.now();
}

function updateAnswerBox() {
  document.getElementById('answer-text').textContent = S.input;
  document.getElementById('answer-box').classList.toggle('has-input', S.input.length > 0);
}

function submit() {
  if (!S.input) return;
  const reactionTime = performance.now() - S.taskStart;
  const userNum = parseFloat(S.input.replace(',','.'));
  const corrNum = parseFloat(S.task.answer);
  const userStr = fmtResult(userNum);
  const corrStr = fmtResult(corrNum);
  const correct = !isNaN(userNum) && userStr === corrStr;

  S.history.push({ display:S.task.display, userAnswer:S.input, correctAnswer:S.task.answer, correct, reactionTime });

  if (correct) {
    S.skill.correctStreak++;
    S.skill.wrongStreak = 0;
    if (S.skill.correctStreak >= 5) {
      S.skill.level = Math.min(5, S.skill.level + 1);
      S.skill.correctStreak = 0;
    }
    
    let points = 1;
    if (reactionTime < 2500) points += 1; // Fluencia bónusz
    if (S.skill.level >= 4) points += 1;  // Nehézségi bónusz
    S.score += points;

    const el = document.getElementById('score-num');
    updateScore();
    el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 150);
  } else {
    S.skill.wrongStreak++;
    S.skill.correctStreak = 0;
    S.mistakes.push(S.task);
    if (S.skill.wrongStreak >= 2) {
      S.skill.level = Math.max(1, S.skill.level - 1);
      S.skill.wrongStreak = 0;
    }
  }
  nextTask();
}

function endGame() {
  clearInterval(S.timer);
  const cfg = CATS[S.cat];
  const hs = loadHS(cfg.hsKey);
  const isRec = S.score > hs;
  if (isRec) saveHS(cfg.hsKey, S.score);

  document.getElementById('result-cat-badge').textContent = cfg.name;
  document.getElementById('result-num').textContent = S.score;
  document.getElementById('result-hs-val').textContent = (isRec ? S.score : hs) + ' pont';
  document.getElementById('new-record').classList.toggle('hidden', !isRec);
  document.getElementById('result-stars').textContent = '⭐'.repeat(S.score < 10 ? 1 : S.score < 25 ? 2 : 3);

  // Statisztika
  const total = S.history.length;
  const correctCount = S.history.filter(h => h.correct).length;
  const avgTime = total ? Math.round(S.history.reduce((a,b)=>a+b.reactionTime,0)/total) : 0;
  
  document.getElementById('stats-area').innerHTML = `
    <div style="margin-top:12px; font-size:13px; color:var(--text-dim); line-height:1.6">
      Pontosság: <b style="color:var(--text)">${total ? Math.round(correctCount/total*100) : 0}%</b> | 
      Átlagidő: <b style="color:var(--text)">${avgTime}ms</b><br>
      Elért szint: <b style="color:var(--accent)">Level ${S.skill.level}</b>
    </div>
  `;

  renderHistory();
  showScreen('result');
  document.getElementById('result').scrollTop = 0;
}

function renderHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  if (!S.history.length) {
    list.innerHTML = '<div style="color:var(--text-dim);font-size:14px;text-align:center;padding:12px 0">Nincs adat.</div>';
    return;
  }
  S.history.forEach(h => {
    const item = document.createElement('div');
    item.className = 'history-item ' + (h.correct ? 'correct' : 'wrong');
    item.innerHTML = `
      <div class="history-icon">${h.correct ? '✓' : '✗'}</div>
      <div class="history-eq">${h.display}</div>
      <div class="history-user">${h.userAnswer}</div>
      ${!h.correct ? `<div class="history-arrow">→</div><div class="history-correct-ans">${h.correctAnswer}</div>` : ''}
    `;
    list.appendChild(item);
  });
}

// --- KEYBOARD ---
function handleKey(val) {
  if (val === 'OK')  { submit(); return; }
  if (val === 'DEL') { S.input = S.input.slice(0,-1); updateAnswerBox(); return; }
  if (val === '.') {
    if (!S.input.includes('.') && S.input.length < 7) { S.input += '.'; updateAnswerBox(); }
    return;
  }
  if (S.input.length < 8) {
    S.input = (S.input === '0') ? val : S.input + val;
    updateAnswerBox();
  }
}

function makeKbBtn(val) {
  const btn = document.createElement('button');
  btn.className = 'kb-btn' + (val==='OK' ? ' kb-ok' : val==='DEL' ? ' kb-del' : val==='.' ? ' kb-dot' : '');
  btn.textContent = val==='DEL' ? '⌫' : val;
  const press = e => { e.preventDefault(); btn.classList.add('pressed'); handleKey(val); };
  const release = e => { e.preventDefault(); btn.classList.remove('pressed'); };
  btn.addEventListener('touchstart', press, {passive:false});
  btn.addEventListener('touchend', release, {passive:false});
  btn.addEventListener('mousedown', e => { e.preventDefault(); handleKey(val); });
  return btn;
}

function rebuildKeyboard(hasDot) {
  const grid = document.getElementById('kb-grid');
  grid.innerHTML = '';
  ['1','2','3','4','5','6','7','8','9'].forEach(d => grid.appendChild(makeKbBtn(d)));
  if (hasDot) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:10px;grid-column:1/-1;';
    ['DEL','.','0','OK'].forEach(v => {
      const b = makeKbBtn(v); b.style.flex = '1'; b.style.aspectRatio = '1.4';
      row.appendChild(b);
    });
    grid.appendChild(row);
  } else {
    ['DEL','0','OK'].forEach(v => grid.appendChild(makeKbBtn(v)));
  }
}

// --- WIRING ---
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => startGame(btn.dataset.cat));
});
document.getElementById('btn-retry').onclick = () => startGame(S.cat);
document.getElementById('btn-home').onclick = () => initHome();

initHome();
</script>
</body>
